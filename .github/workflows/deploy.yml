name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Historial COMPLETO: el sitemap resuelve lastmod con `git log -1` por
          # archivo; con el checkout shallow (default) todas las fechas saldrían
          # iguales a la del HEAD (verificado en piloto EVENTECH).
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Ensure CF Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: CLOUDFLARE_ACCOUNT_ID=711c2e12a6bd9cec3ec5c6a7633f147c npx -y wrangler@3 pages project create informate-mx --production-branch=main 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 711c2e12a6bd9cec3ec5c6a7633f147c
          command: pages deploy dist --project-name=informate-mx --branch=main
